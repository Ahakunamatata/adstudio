<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AD Studio Agent Architecture Explorer</title>
  <style>
    :root {
      --bg: #f6f7f4;
      --paper: #fffdf7;
      --ink: #172026;
      --muted: #68737d;
      --line: #d8ded8;
      --shadow: 0 18px 50px rgba(42, 45, 38, 0.12);
      --entry: #2f76d2;
      --ui: #62b6e6;
      --runtime: #8561c8;
      --snapshot: #4c63c7;
      --llm: #d85b9c;
      --adapter: #1a9aa4;
      --approval: #39a86b;
      --execution: #df8b32;
      --store: #d0a31e;
      --risk: #d14b4b;
      --unknown: #7b8794;
      color-scheme: light;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      background:
        linear-gradient(90deg, rgba(23, 32, 38, 0.035) 1px, transparent 1px),
        linear-gradient(rgba(23, 32, 38, 0.035) 1px, transparent 1px),
        var(--bg);
      background-size: 28px 28px;
      color: var(--ink);
      font: 14px/1.55 ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Noto Sans CJK SC", sans-serif;
    }

    button, input { font: inherit; }
    button { cursor: pointer; }
    .app { min-height: 100vh; display: flex; flex-direction: column; }
    header {
      padding: 22px 24px 18px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 253, 247, 0.92);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 20;
    }
    .header-top {
      display: flex;
      justify-content: space-between;
      gap: 24px;
      align-items: flex-start;
      margin-bottom: 12px;
    }
    h1 {
      margin: 0;
      font-size: 26px;
      line-height: 1.08;
      letter-spacing: 0;
      font-weight: 760;
    }
    .thesis {
      margin: 8px 0 0;
      max-width: 1040px;
      color: #34414b;
      font-size: 15px;
    }
    .view-toggle {
      display: inline-flex;
      gap: 4px;
      padding: 4px;
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 999px;
      flex: 0 0 auto;
    }
    .view-toggle button {
      border: 0;
      background: transparent;
      color: var(--muted);
      padding: 7px 12px;
      border-radius: 999px;
    }
    .view-toggle button.active {
      background: var(--ink);
      color: #fff;
    }
    .status-grid {
      display: grid;
      grid-template-columns: repeat(10, minmax(108px, 1fr));
      gap: 8px;
    }
    .status-card {
      background: #fff;
      border: 1px solid var(--line);
      border-left: 3px solid var(--unknown);
      border-radius: 8px;
      padding: 7px 9px;
      min-height: 56px;
    }
    .status-card.yes { border-left-color: var(--approval); }
    .status-card.no { border-left-color: var(--risk); }
    .status-card.inferred { border-left-color: var(--execution); }
    .status-card strong { display: block; font-size: 12px; line-height: 1.25; }
    .status-card span { display: inline-flex; margin-top: 4px; font-size: 11px; line-height: 1.25; color: var(--muted); }

    .shell {
      flex: 1;
      min-height: 0;
      display: grid;
      grid-template-columns: 286px minmax(0, 1fr) 390px;
      gap: 0;
    }
    aside.sidebar,
    aside.detail {
      background: rgba(255, 253, 247, 0.94);
      border-right: 1px solid var(--line);
      min-height: calc(100vh - 170px);
      overflow: auto;
    }
    aside.detail {
      border-right: 0;
      border-left: 1px solid var(--line);
    }
    .sidebar-inner, .detail-inner { padding: 18px; }
    .search-box {
      position: sticky;
      top: 0;
      background: rgba(255, 253, 247, 0.96);
      padding-bottom: 12px;
      z-index: 2;
    }
    .search-box input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 12px;
      background: #fff;
      outline: none;
    }
    .tree-layer {
      margin: 10px 0 14px;
    }
    .tree-layer h3 {
      margin: 0 0 6px;
      font-size: 12px;
      text-transform: uppercase;
      color: var(--muted);
      letter-spacing: 0.04em;
    }
    .tree-node {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 8px;
      border: 1px solid transparent;
      background: transparent;
      border-radius: 7px;
      padding: 7px 8px;
      text-align: left;
      color: #25313a;
    }
    .tree-node:hover,
    .tree-node.active {
      background: #fff;
      border-color: var(--line);
    }
    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--unknown);
      flex: 0 0 auto;
    }
    .main {
      min-width: 0;
      display: flex;
      flex-direction: column;
    }
    .tabs {
      display: flex;
      gap: 8px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      background: rgba(246, 247, 244, 0.88);
      overflow-x: auto;
    }
    .tab {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 999px;
      color: #33414b;
      white-space: nowrap;
      padding: 8px 13px;
    }
    .tab.active {
      background: var(--ink);
      color: #fff;
      border-color: var(--ink);
    }
    .canvas-wrap {
      flex: 1;
      min-height: 620px;
      overflow: auto;
      padding: 18px;
    }
    .canvas-board {
      min-width: 980px;
      max-width: 1600px;
    }
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 0 0 14px;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      padding: 5px 9px;
      color: #43505a;
      font-size: 12px;
    }
    .layer-grid {
      display: grid;
      grid-template-columns: repeat(9, minmax(190px, 1fr));
      gap: 12px;
      align-items: start;
    }
    .arch-mode-toggle,
    .workflow-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: 0 0 14px;
      min-width: 980px;
    }
    .arch-mode-toggle p,
    .workflow-toolbar p {
      margin: 0;
      color: #3e4b54;
      font-size: 14px;
    }
    .mode-buttons {
      display: inline-flex;
      gap: 6px;
      padding: 4px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      flex: 0 0 auto;
    }
    .mode-buttons button {
      border: 0;
      background: transparent;
      border-radius: 999px;
      padding: 7px 12px;
      color: var(--muted);
      white-space: nowrap;
    }
    .mode-buttons button.active {
      background: var(--ink);
      color: #fff;
    }
    .arch-main-path {
      min-width: 1120px;
      display: grid;
      grid-template-columns: repeat(4, minmax(250px, 1fr));
      gap: 18px 28px;
      counter-reset: archpath;
    }
    .arch-step-card {
      position: relative;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.86);
      border-radius: 8px;
      padding: 14px;
      min-height: 230px;
      box-shadow: 0 10px 26px rgba(42,45,38,0.08);
    }
    .arch-step-card::after {
      content: "→";
      position: absolute;
      right: -23px;
      top: 50%;
      transform: translateY(-50%);
      color: #7b8794;
      font-size: 22px;
      font-weight: 800;
    }
    .arch-step-card:nth-child(4)::after,
    .arch-step-card:nth-child(8)::after {
      display: none;
    }
    .arch-step-card.active-step {
      border-color: var(--ink);
      box-shadow: 0 0 0 3px rgba(23, 32, 38, 0.14), var(--shadow);
    }
    .arch-step-number {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: var(--ink);
      color: #fff;
      font-weight: 800;
      margin-bottom: 9px;
    }
    .arch-step-card h2 {
      margin: 0 0 6px;
      font-size: 18px;
      line-height: 1.2;
    }
    .arch-step-card p {
      margin: 0 0 12px;
      color: #46545f;
      min-height: 42px;
    }
    .arch-main-node {
      width: 100%;
      border: 1px solid var(--line);
      border-left: 6px solid var(--layer-color, var(--unknown));
      background: #fff;
      border-radius: 8px;
      padding: 11px;
      text-align: left;
      box-shadow: 0 8px 18px rgba(42,45,38,0.08);
      font-weight: 750;
    }
    .arch-main-node.active {
      outline: 3px solid rgba(23,32,38,0.18);
    }
    .arch-main-node small {
      display: block;
      color: var(--muted);
      font-weight: 500;
      margin-top: 4px;
    }
    .arch-chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-top: 12px;
    }
    .arch-chip {
      border: 1px solid var(--line);
      border-left: 4px solid var(--layer-color, var(--unknown));
      background: #fffefb;
      border-radius: 999px;
      padding: 6px 9px;
      color: #384650;
      font-size: 12px;
      max-width: 100%;
    }
    .arch-chip.active {
      background: var(--ink);
      color: #fff;
      border-color: var(--ink);
    }
    .workflow-board {
      min-width: 1180px;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: rgba(255,255,255,0.68);
    }
    .workflow-lane {
      display: grid;
      grid-template-columns: 178px minmax(0, 1fr);
      min-height: 126px;
      border-bottom: 1px solid var(--line);
    }
    .workflow-lane:last-child { border-bottom: 0; }
    .workflow-lane-label {
      position: sticky;
      left: 0;
      z-index: 3;
      display: flex;
      align-items: center;
      padding: 14px;
      background: #f8f6ed;
      border-right: 1px solid var(--line);
      font-weight: 800;
      color: #2f3b44;
    }
    .workflow-lane-track {
      display: flex;
      gap: 12px;
      align-items: stretch;
      padding: 12px;
      min-width: max-content;
    }
    .workflow-step-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .workflow-step-wrap::after {
      content: "→";
      color: #7b8794;
      font-size: 18px;
      font-weight: 800;
    }
    .workflow-step-wrap:last-child::after { display: none; }
    .workflow-step {
      width: 245px;
      min-height: 160px;
      border: 1px solid var(--line);
      border-left: 6px solid var(--layer-color, var(--unknown));
      border-radius: 8px;
      background: #fff;
      padding: 12px;
      text-align: left;
      box-shadow: 0 9px 22px rgba(42,45,38,0.08);
      transition: opacity 0.16s ease, transform 0.16s ease, box-shadow 0.16s ease;
    }
    .workflow-step:hover { transform: translateY(-1px); box-shadow: var(--shadow); }
    .workflow-step.active-path {
      opacity: 1;
      box-shadow: 0 0 0 3px rgba(23,32,38,0.14), var(--shadow);
    }
    .workflow-step.inactive-path {
      opacity: 0.3;
    }
    .workflow-step.selected {
      outline: 3px solid rgba(23,32,38,0.22);
    }
    .workflow-step-number {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 25px;
      height: 25px;
      border-radius: 50%;
      background: var(--ink);
      color: #fff;
      font-size: 12px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    .workflow-step-title {
      display: block;
      font-size: 15px;
      line-height: 1.25;
      font-weight: 800;
      color: #172026;
    }
    .workflow-step-engineering {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 11px;
      overflow-wrap: anywhere;
    }
    .workflow-step-io {
      display: grid;
      grid-template-columns: 1fr;
      gap: 5px;
      margin: 9px 0;
      color: #43505a;
      font-size: 12px;
    }
    .workflow-step-io span {
      display: block;
      padding: 5px 7px;
      border-radius: 6px;
      background: #f7f8f3;
    }
    .workflow-fact-badge {
      display: inline-flex;
      border-radius: 999px;
      background: #fff7d6;
      color: #684f08;
      border: 1px solid #ead48a;
      padding: 3px 7px;
      font-size: 11px;
    }
    .layer-column {
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.72);
      border-radius: 8px;
      padding: 10px;
      min-height: 360px;
    }
    .layer-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 9px;
      font-weight: 720;
      font-size: 13px;
    }
    .node-card {
      width: 100%;
      border: 1px solid var(--line);
      background: #fff;
      border-left: 5px solid var(--unknown);
      border-radius: 8px;
      padding: 10px;
      margin: 8px 0;
      text-align: left;
      min-height: 68px;
      box-shadow: 0 6px 18px rgba(42,45,38,0.06);
      transition: transform 0.14s ease, box-shadow 0.14s ease, opacity 0.14s ease;
    }
    .node-card:hover { transform: translateY(-1px); box-shadow: var(--shadow); }
    .node-card.active {
      outline: 3px solid rgba(23,32,38,0.18);
      box-shadow: 0 18px 44px rgba(42,45,38,0.18);
    }
    .node-card.upstream { box-shadow: 0 0 0 2px rgba(47,118,210,0.24); }
    .node-card.downstream { box-shadow: 0 0 0 2px rgba(57,168,107,0.24); }
    .node-card.dimmed { opacity: 0.34; }
    .node-card small { display: block; color: var(--muted); margin-top: 5px; }
    .node-title-row {
      display: flex;
      justify-content: space-between;
      gap: 8px;
    }
    .node-title-row strong { font-size: 13px; line-height: 1.25; }
    .pill {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      background: #f1f4ef;
      color: #586570;
      padding: 2px 7px;
      font-size: 11px;
      white-space: nowrap;
    }
    .flow {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .flow-row {
      display: flex;
      gap: 10px;
      align-items: stretch;
      min-width: max-content;
    }
    .arrow {
      align-self: center;
      color: #7b8794;
      font-weight: 700;
      font-size: 18px;
    }
    .flow-section {
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.74);
      border-radius: 8px;
      padding: 12px;
    }
    .flow-section h2 {
      margin: 0 0 4px;
      font-size: 18px;
    }
    .flow-section p {
      margin: 0 0 12px;
      color: var(--muted);
    }
    .split-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(280px, 1fr));
      gap: 12px;
      min-width: 980px;
    }
    .lane {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255,255,255,0.78);
      padding: 12px;
    }
    .lane h3 { margin: 0 0 10px; font-size: 15px; }
    .callout {
      border: 1px solid var(--line);
      border-left: 5px solid var(--risk);
      background: #fff9f4;
      border-radius: 8px;
      padding: 11px 12px;
      margin: 12px 0;
      color: #56362f;
    }
    .detail h2 { margin: 0 0 6px; font-size: 21px; }
    .detail .plain {
      color: #33414b;
      margin: 8px 0 12px;
    }
    .meta-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin: 12px 0;
    }
    .meta {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 8px;
    }
    .meta span {
      display: block;
      color: var(--muted);
      font-size: 11px;
    }
    .meta strong { font-size: 12px; }
    details.detail-section {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      margin: 10px 0;
      overflow: hidden;
    }
    details.detail-section summary {
      padding: 10px 12px;
      font-weight: 700;
      cursor: pointer;
      background: #fbfaf4;
    }
    .detail-list { padding: 10px 12px 12px; }
    .io-card {
      border: 1px solid #e5e8e1;
      border-radius: 7px;
      padding: 8px;
      margin: 6px 0;
      background: #fffefb;
    }
    .io-card strong { display: block; font-size: 12px; }
    .io-card span { display: block; color: #50606b; font-size: 12px; }
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 10px 12px 12px;
    }
    .chip {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: #394852;
      padding: 5px 8px;
      font-size: 12px;
    }
    .file-ref {
      display: block;
      border: 1px solid #e6e8df;
      border-radius: 7px;
      padding: 8px;
      margin: 6px 0;
      color: #31404a;
      background: #fffefb;
      overflow-wrap: anywhere;
    }
    .bottom {
      border-top: 1px solid var(--line);
      background: rgba(255,253,247,0.96);
      padding: 18px 24px 30px;
    }
    .bottom-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
    }
    .bottom-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 14px;
    }
    .bottom-card h3 { margin: 0 0 8px; }
    .bottom-card ul { margin: 0; padding-left: 18px; color: #43505a; }
    .hidden { display: none !important; }

    [data-layer="entry"] { --layer-color: var(--entry); }
    [data-layer="ui"] { --layer-color: var(--ui); }
    [data-layer="runtime"] { --layer-color: var(--runtime); }
    [data-layer="snapshot"] { --layer-color: var(--snapshot); }
    [data-layer="llm"] { --layer-color: var(--llm); }
    [data-layer="adapter"] { --layer-color: var(--adapter); }
    [data-layer="approval"] { --layer-color: var(--approval); }
    [data-layer="execution"] { --layer-color: var(--execution); }
    [data-layer="store"] { --layer-color: var(--store); }
    [data-layer="risk"] { --layer-color: var(--risk); }
    .node-card, .status-card, .dot { border-left-color: var(--layer-color, var(--unknown)); }
    .dot { background: var(--layer-color, var(--unknown)); border-left: 0; }
    .layer-title .dot { width: 11px; height: 11px; }

    @media (max-width: 1180px) {
      .status-grid { grid-template-columns: repeat(5, 1fr); }
      .shell { grid-template-columns: 240px minmax(0, 1fr); }
      aside.detail { grid-column: 1 / -1; border-left: 0; border-top: 1px solid var(--line); min-height: auto; }
      .bottom-grid { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 760px) {
      header { padding: 18px 14px; }
      .header-top { flex-direction: column; }
      .status-grid { grid-template-columns: repeat(2, 1fr); }
      .shell { grid-template-columns: 1fr; }
      aside.sidebar { min-height: auto; max-height: 340px; }
      .bottom-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="header-top">
        <div>
          <h1>AD Studio Agent Architecture Explorer</h1>
          <p class="thesis">这个 Agent 不是让 LLM 直接操作系统，而是由产品层组装上下文、LLM 返回结构化建议、Guard/Approval 控制执行、Store 记录事实的受控 Agent 工作台。</p>
        </div>
        <div class="view-toggle" aria-label="视图模式">
          <button id="pmMode" class="active" type="button">PM 视图</button>
          <button id="engMode" type="button">工程视图</button>
        </div>
      </div>
      <div id="statusGrid" class="status-grid"></div>
    </header>

    <div class="shell">
      <aside class="sidebar">
        <div class="sidebar-inner">
          <div class="search-box">
            <input id="searchInput" type="search" placeholder="搜索节点、中文说明、文件名..." />
          </div>
          <div id="tree"></div>
        </div>
      </aside>
      <main class="main">
        <nav id="tabs" class="tabs" aria-label="架构视图"></nav>
        <section class="canvas-wrap">
          <div id="canvas" class="canvas-board"></div>
        </section>
      </main>
      <aside class="detail">
        <div id="detailPanel" class="detail-inner"></div>
      </aside>
    </div>

    <footer class="bottom">
      <div id="bottomGrid" class="bottom-grid"></div>
    </footer>
  </div>

  <script>
    const LAYER_LABELS = {
      entry: "用户入口层",
      ui: "Workbench / UI 层",
      runtime: "Agent Runtime 层",
      snapshot: "Snapshot / Context 层",
      llm: "LLM 决策层",
      adapter: "Output Adapter 层",
      approval: "Guard / Approval 层",
      execution: "Execution 层",
      store: "Store / Fact 层",
      risk: "Risk / Conflict"
    };

    const ARCHITECTURE = {
      statusCards: [
        { label: "LLM 决策", status: "有", tone: "yes", note: "/api/agent/decide structured output" },
        { label: "AgentInputSnapshot", status: "有", tone: "yes", note: "createAgentInputSnapshot" },

        ...(detail.sourceFiles || []), ...(detail.keyTypesOrFunctions || []),
        ...(detail.pmChecks || []), ...(detail.commonIssues || [])
      ].join(" ").toLowerCase();
      return haystack.includes(searchTerm.toLowerCase());
    }

      if (upstream.has(id)) return "upstream";
      if (downstream.has(id)) return "downstream";
      return activeNodeId ? "dimmed" : "";

      const toolbar = `
        <div class="workflow-toolbar">
          <p>从左到右看：用户动作 → UI 接收 → Runtime 调度 → Snapshot 组装 → LLM 决策 → Output 分流 → Approval/Execution → Store 写入。</p>
          <div class="mode-buttons" aria-label="流程分支">
            ${WORKFLOW_VARIANTS.map((variant) => `
              <button type="button" class="${activeWorkflowVariant === variant.id ? "active" : ""}" data-workflow-variant="${variant.id}">${variant.label}</button>
            `).join("")}
          </div>
        </div>
      `;
      const lanes = WORKFLOW_LANES.map((lane) => `
        <section class="workflow-lane">
          <div class="workflow-lane-label">${lane.label}</div>
          <div class="workflow-lane-track">
            ${workflowStepsForLane(lane.id).map((step) => {
              const node = nodeById(step.nodeId);
              const activePath = step.variants.includes(activeWorkflowVariant);
              return `
                <div class="workflow-step-wrap">
                  <button type="button" class="workflow-step ${activePath ? "active-path" : "inactive-path"} ${activeWorkflowStepId === step.id ? "selected" : ""}" data-workflow-step-id="${step.id}" data-layer="${node.layer}">
                    <span class="workflow-step-number">${step.step}</span>
                    <span class="workflow-step-title">${step.title}</span>
                    <span class="workflow-step-engineering">${step.engineering}</span>
                    <span class="workflow-step-io">
                      <span><strong>输入</strong> ${step.input}</span>
                      <span><strong>输出</strong> ${step.output}</span>
                    </span>
                    <span class="workflow-fact-badge">${step.factLevel}</span>
                  </button>
                </div>
              `;
            }).join("")}
          </div>
        </section>
      `).join("");
      document.getElementById("canvas").innerHTML = `
        ${toolbar}
        <div class="workflow-board">${lanes}</div>`;
      document.querySelectorAll("[data-workflow-variant]").forEach((button) => {
        button.addEventListener("click", () => {
          activeWorkflowVariant = button.dataset.workflowVariant;
          const selectedStep = workflowStepById(activeWorkflowStepId);
          if (!selectedStep || !selectedStep.variants.includes(activeWorkflowVariant)) {
            const firstStep = WORKFLOW_STEPS.find((step) => step.variants.includes(activeWorkflowVariant));
            activeWorkflowStepId = firstStep?.id ?? "";
            activeNodeId = firstStep?.nodeId ?? activeNodeId;
          }
          renderAll();
        });
      });
      bindWorkflowStepClicks();
    }

    function renderLlmDecision() {
      document.getElementById("canvas").innerHTML = `
        <div class="split-grid">
          <section class="lane">
            <h3>输入</h3>
            ${["system-prompt", "user-prompt", "agent-input-snapshot", "llm-agent-output-schema"].map((id) => nodeCard(id)).join("")}
          </section>
          <section class="lane">
            <h3>模型输出字段</h3>
            ${nodeCard("llm-agent-output-schema", "message / questions / confirmation / canvasActions / generation / briefPatch / safetyNotes")}
            <div class="callout">message/questions/safetyNotes 是展示；briefPatch 是状态更新；canvasActions/generation 是 proposal；proposal 不是事实。</div>
          </section>
          <section class="lane">
            <h3>分流结果</h3>
            ${["ui-sanitizer", "questions-renderer", "confirmation-renderer", "briefpatch-applier", "approval-flow", "generation-approval"].map((id) => nodeCard(id)).join("")}
          </section>
        </div>`;
      bindNodeClicks();
    }

    function renderApprovalExecution() {
      document.getElementById("canvas").innerHTML = `
        <div class="flow">
          <section class="flow-section">
            <h2>Canvas Execution</h2>
            <p>没有 ApprovalRequest 不执行；reject 不改 CanvasGraph；approved 不等于 executed；executed 后才是事实。</p>
            ${renderFlowRows(ARCHITECTURE.flows.canvasApproval)}
          </section>
          <section class="flow-section">
            <h2>Generation Execution</h2>
            <p>确认前不能调用 Vidu/provider；重复点击不能重复扣费；external URL 不是长期资产；storage 成功后才是可恢复资产。</p>
            ${renderFlowRows(ARCHITECTURE.flows.generationExecution)}
          </section>
        </div>`;
      bindNodeClicks();
    }

    function renderStoreFact() {
      document.getElementById("canvas").innerHTML = `
        <div class="flow-section">
          <h2>Store / Fact 数据流</h2>
          <p>这里区分体验状态、本地 MVP store、项目事实集合、执行事实、资产事实、审计事实和调试视图。</p>
          ${renderFlowRows(ARCHITECTURE.flows.storeFact, {
            "runtime-state-store": "体验恢复，不是生产事实源",
            "workspace-store": "本地 MVP",
            "project-bundle": "最接近项目事实集合",
            "canvas-graph": "画布执行后事实",
            "generation-task": "生成任务事实",
            "media-asset": "资产事实",
            "event-log": "审计事实",
            "session-replay": "调试视图，不是执行事实源"
          })}
        </div>`;
      bindNodeClicks();
    }

    function renderCanvas() {
      if (activeTab === "architecture") renderArchitecture();
      if (activeTab === "userInput") renderUserInput();
      if (activeTab === "llmDecision") renderLlmDecision();
      if (activeTab === "approvalExecution") renderApprovalExecution();
      if (activeTab === "storeFact") renderStoreFact();
    }

    function renderSection(title, content, open = true) {
      return `<details class="detail-section" ${open ? "open" : ""}><summary>${title}</summary>${content}</details>`;
    }

    function renderWorkflowStepDetail(step) {
      const node = nodeById(step.nodeId);
      const moduleDetail = NODE_DETAILS[step.nodeId] || quick(step.nodeId, {});
      const activeVariant = WORKFLOW_VARIANTS.find((variant) => variant.id === activeWorkflowVariant)?.label ?? activeWorkflowVariant;
      const downstreamStep = WORKFLOW_STEPS
        .filter((item) => item.variants.includes(activeWorkflowVariant) && item.step > step.step)
        .sort((left, right) => left.step - right.step)[0];
      const io = (items) => `<div class="detail-list">${items.map((item) => `<div class="io-card"><strong>${item.name}</strong><span>${item.description}</span></div>`).join("")}</div>`;
      const list = (items) => `<div class="detail-list">${items.map((item) => `<div class="io-card"><span>${item}</span></div>`).join("")}</div>`;

      document.getElementById("detailPanel").innerHTML = `
        <div data-layer="${node.layer}">
          <span class="badge"><span class="dot"></span>${activeVariant}</span>
          <h2>${step.step}. ${step.title}</h2>
          <p class="plain">${step.detail.role}</p>
          <div class="meta-grid">
            <div class="meta"><span>谁处理</span><strong>${step.detail.owner}</strong></div>
            <div class="meta"><span>工程名</span><strong>${step.engineering}</strong></div>
            <div class="meta"><span>是否用户可见</span><strong>${moduleDetail.userVisible ? "是" : "否"}</strong></div>
            <div class="meta"><span>是否事实源</span><strong>${moduleDetail.factSource ? "是" : "否"}</strong></div>
            <div class="meta"><span>事实层级</span><strong>${step.factLevel}</strong></div>
            <div class="meta"><span>模块节点</span><strong>${node.label}</strong></div>
          </div>
          ${renderSection("这一步在一轮请求里的作用", list([step.process]), true)}
          ${renderSection("输入是什么", io([{ name: step.input, description: "来自当前流程上一步或用户动作。" }]), true)}
          ${renderSection("谁处理", list([`${step.detail.owner} · ${step.engineering}`]), true)}
          ${renderSection("输出是什么", io([{ name: step.output, description: "交给下一步继续处理。" }]), true)}
          ${renderSection("下游去哪", list([downstreamStep ? `${downstreamStep.step}. ${downstreamStep.title} · ${downstreamStep.engineering}` : "当前分支到这里结束，结果留在 UI 或 Store 中。"]), true)}
          ${renderSection("PM 怎么判断这一步成功", list([step.detail.success]), true)}
          ${renderSection("常见问题", list([step.detail.issues, ...moduleDetail.commonIssues.slice(0, 2)]), false)}
          ${renderSection("关联模块百科", `<div class="chips"><button class="chip" data-node-id="${step.nodeId}" type="button">${node.label}</button></div>`, false)}
        </div>
      `;
      bindNodeClicks();
    }

    function renderDetail() {
      const activeStep = workflowStepById(activeWorkflowStepId);
      if (activeTab === "userInput" && activeStep) {
        renderWorkflowStepDetail(activeStep);
        return;
      }
      const node = nodeById(activeNodeId);
      const detail = NODE_DETAILS[activeNodeId] || quick(activeNodeId, {});
      const engineering = viewMode === "eng";
      const io = (items) => `<div class="detail-list">${(items || []).map((item) => typeof item === "string" ? `<div class="io-card"><span>${item}</span></div>` : `<div class="io-card"><strong>${item.name}</strong><span>${item.description}</span></div>`).join("")}</div>`;
      const list = (items) => `<div class="detail-list">${(items || []).map((item) => `<div class="io-card"><span>${item}</span></div>`).join("")}</div>`;
      const files = (items) => `<div class="detail-list">${(items || []).map((item) => `<span class="file-ref">${item}</span>`).join("")}</div>`;
      document.getElementById("detailPanel").innerHTML = `
        <div data-layer="${node.layer}">
          <span class="badge"><span class="dot"></span>${detail.layer}</span>
          <h2>${detail.title}</h2>
          <p class="plain">${detail.plain}</p>
          <div class="meta-grid">
            <div class="meta"><span>是否用户可见</span><strong>${detail.userVisible ? "是" : "否"}</strong></div>
            <div class="meta"><span>是否事实源</span><strong>${detail.factSource ? "是" : "否"}</strong></div>
            <div class="meta"><span>事实层级</span><strong>${detail.factLevel}</strong></div>
            <div class="meta"><span>当前节点</span><strong>${activeNodeId}</strong></div>
          </div>
          ${renderSection("输入", io(detail.inputs), true)}
          ${renderSection("处理逻辑", list(detail.processing), true)}
          ${renderSection("输出", io(detail.outputs), true)}
          ${renderSection("上游依赖", `<div class="chips">${detail.upstream.map((id) => `<button class="chip" data-node-id="${id}" type="button">${nodeById(id).label}</button>`).join("") || "<span class='chip'>无直接上游</span>"}</div>`, false)}
          ${renderSection("下游影响", `<div class="chips">${detail.downstream.map((id) => `<button class="chip" data-node-id="${id}" type="button">${nodeById(id).label}</button>`).join("") || "<span class='chip'>无直接下游</span>"}</div>`, false)}
          ${renderSection("来源文件", files(detail.sourceFiles), engineering)}
          ${renderSection("关键类型 / 函数 / 字段", list(detail.keyTypesOrFunctions), engineering)}
          ${renderSection("PM 验收点", list(detail.pmChecks), true)}
          ${renderSection("常见问题", list(detail.commonIssues), false)}
          <details class="detail-section">
            <summary>折叠代码 / JSON 示例</summary>
            <div class="detail-list">
              <pre class="io-card">${JSON.stringify({ id: activeNodeId, upstream: detail.upstream, downstream: detail.downstream }, null, 2)}</pre>
            </div>
          </details>
        </div>
      `;
      bindNodeClicks();
    }

    function renderBottom() {
      const card = (title, items, tone) => `
        <section class="bottom-card" data-layer="${tone || "risk"}">
          <h3><span class="dot"></span> ${title}</h3>
          <ul>${items.map((item) => `<li>${item}</li>`).join("")}</ul>
        </section>
      `;
      document.getElementById("bottomGrid").innerHTML =
        card("Open Questions", ARCHITECTURE.openQuestions, "risk") +
        card("Inferred Assumptions", ARCHITECTURE.assumptions, "execution") +
        card("Code / Doc Conflict Risks", ARCHITECTURE.risks, "risk") +
        card("文件引用清单", ARCHITECTURE.fileRefs, "store");
    }

    function renderAll() {
      renderStatus();
      renderTabs();
      renderTree();
      renderCanvas();
      renderDetail();
      renderBottom();
    }

    document.getElementById("searchInput").addEventListener("input", (event) => {
      searchTerm = event.target.value.trim();
      renderAll();
      document.getElementById("searchInput").value = searchTerm;
      document.getElementById("searchInput").focus();
    });
    document.getElementById("pmMode").addEventListener("click", () => {
      viewMode = "pm";
      document.getElementById("pmMode").classList.add("active");
      document.getElementById("engMode").classList.remove("active");
      renderDetail();
    });
    document.getElementById("engMode").addEventListener("click", () => {
      viewMode = "eng";
      document.getElementById("engMode").classList.add("active");
      document.getElementById("pmMode").classList.remove("active");
      renderDetail();
    });

    renderAll();
  </script>
</body>
</html>
